<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de reservación</title>
    <link rel="stylesheet" href="css/banner_elsazon.css">
    <link rel="stylesheet" href="css/formulario.css">
</head>
<body>    
    <header>
        <div id="banner-container"></div>
    </header>

    <main>

        <div id="contenido">
            <section id="inicio" class="seccion">
                <p>Reserva tu mesa en segundos y sin complicaciones.<br> 
                   Elige el día, la hora y confirma en un clic.</p>
                <button id="button" onclick="cambiarSeccion('formulario')">Iniciar</button> 
            </section>

            <section id="formulario" class="seccion oculto">
                <h2>Reserva tu mesa</h2>
                <form id="form-reserva">
                    <label for="fecha">Fecha de reservación:</label>
                    <input type="date" id="fecha" required>

                    <label for="hora">Hora de reservación:</label>
                    <select id="hora" required></select> 

                    <label for="personas">Número de personas:</label>
                    <select id="personas" required>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                    </select>

                    <label for="nombre">Nombre del cliente:</label>
                    <input type="text" id="nombre" required>

                    <label for="email">Correo electrónico:</label>
                    <input type="email" id="email" required>

                    <label for="telefono">Teléfono:</label>
                    <input type="tel" id="telefono" required>

                    <label for="notas">Notas adicionales:</label>
                    <textarea id="notas"></textarea>

                 
                    <button  id="button" type="button" onclick="validarYEnviar()">Reservar ahora</button>
                </form>
            </section>

            <section id="confirmacion" class="seccion oculto">
                <h2>¡Tu reservación ha sido agendada!</h2>
                <p>Tu código de reservación es: <strong id="codigo-reserva">Cargando...</strong></p>
                <button id="button" onclick="cambiarSeccion('inicio')">Explora nuestro menú (en construcción)</button>
            </section>
        </div>
    </main>

    <script src="js/banner.js"></script>
    <script src="js/navegacion_formulario.js"></script>
    <script src="js/reservaciones.js"></script> 
    <script src="js/validaciones.js"></script>
</html>
